<div id="home">
  <div id="navDiv" [class.open]="showNav">
    <app-navigator></app-navigator>
  </div>
  <p-scroll-panel [style]="{ width: '100%', height: '100vh' }">
    <div id="homeBigDiv">
      <p-tabs value="0" (valueChange)="onTabChange($event)">
        <p-tablist>
          <div
            (click)="toggleNav()"
            [ngClass]="{ navButtonDiv: !showNav, navButtonDivOpen: showNav }"
          >
            <button pButton>
              <i class="pi pi-bars"></i>
            </button>
          </div>
          <div id="tabsDiv">
            <p-tab value="0"> <button pButton>Calendario</button></p-tab>
            <p-tab value="1"> <button pButton>Mapa</button></p-tab>
          </div>
          <div style="height: 100%;">
            <img style="height: 5vh;" src="assets/images/populi-manifiesta-logo-2.png" />
          </div>
          <div id="monthButtons">
            <button (click)="monthChange(false)" pButton>
              <i class="pi pi-arrow-left"></i>
            </button>
            <button pButton>{{ monthsNames[month + 1] }}</button>
            <button (click)="monthChange(true)" pButton>
              <i class="pi pi-arrow-right"></i>
            </button>
          </div>
          <div>
            <div id="createButtonDiv">
              <button
                pButton
                label="Crear evento"
                (click)="showCreateEvent(true)"
              ></button>
            </div>
          </div>
        </p-tablist>
        <p-tabpanels>
          <p-tabpanel value="0">
            <div id="calendarDiv">
              <app-calendar
                [events]="events"
                [month]="month"
                (dayClicked)="toggleDay($event)"
              ></app-calendar>
              <div id="info"></div>
            </div>
          </p-tabpanel>
          <p-tabpanel value="1">
            <div id="mapDiv">
              <app-map (onLocationClick)="onLocationClick($event)" [events]="events" #mapComponent></app-map>
            </div>
          </p-tabpanel>
        </p-tabpanels>
      </p-tabs>
      <app-event-list [events]="events"></app-event-list>
    </div>
  </p-scroll-panel>

  <div id="overlay" [ngClass]="{ visible: showOverlay }">
    @if (this.showOverlay) {
      <div class="closeCrossDiv" (click)="this.showOverlay = false">
        <i class="pi pi-times"></i>
      </div>
    }
    @if (this.showDescription) {
      <div class="returnArrowDiv" (click)="toggleDescription(false, true)">
        <i class="pi pi-arrow-right"></i>
      </div>
    }
    @if (showNews) {
      <div class="divInsideRight">
        <p-scrollPanel
          [style]="{ width: '100%', height: '100%', padding: '2%' }"
        >
          <div id="scrollDiv">
            @if (homeEvents && homeEvents.length > 0) {
              <div
                class="newsDiv"
                (click)="this.toggleDescription(true, false, event)"
                *ngFor="let event of homeEvents"
              >
                <app-home-news [event]="event"></app-home-news>
              </div>
            } @else {
              <h2>No hay noticias disponibles en este momento.</h2>
            }
          </div>
        </p-scrollPanel>
      </div>
    } @else if (showDescription && selectedEvent) {
      <div class="divInsideRight">
        <p-scrollPanel *ngIf="true" [style]="{ width: '100%', height: '100%' }">
          <div class="dayDescription">
            <app-day-description [event]="selectedEvent"></app-day-description>
          </div>
        </p-scrollPanel>
      </div>
    } @else if (showEventManager) {
      <div class="divInsideRight">
        <p-scrollPanel [style]="{ width: '100%', height: '100%' }">
          <div class="dayDescription">
            <app-event-manager  (closeDescriptionEmitter)="showCreateEvent(false)"></app-event-manager>
          </div>
        </p-scrollPanel>
      </div>
    }
  </div>
</div>
